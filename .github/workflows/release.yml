name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to build, for example v0.1.0.
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  create-release:
    name: Create release
    runs-on: ubuntu-latest
    steps:
      - name: Create or update GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          body="$(cat <<'BODY'
          CaptainPassword desktop builds for Windows x64, macOS Apple Silicon, and macOS Intel.

          macOS builds are ad-hoc signed to keep the app bundle structurally valid, but they are not notarized yet. macOS may still show a security warning until Developer ID signing and notarization are configured.
          BODY
          )"

          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "船长密码箱 ${RELEASE_TAG}" \
              --notes "${body}" \
              --latest
          else
            gh release create "${RELEASE_TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "船长密码箱 ${RELEASE_TAG}" \
              --notes "${body}" \
              --latest
          fi

  build-release:
    name: Build ${{ matrix.name }}
    needs: create-release
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            platform: macos-latest
            rust-target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles app
            asset-suffix: macOS-AppleSilicon
            bundle-kind: macos
          - name: macOS Intel
            platform: macos-latest
            rust-target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin --bundles app
            asset-suffix: macOS-Intel
            bundle-kind: macos
          - name: Windows x64
            platform: windows-latest
            rust-target: x86_64-pc-windows-msvc
            args: --bundles nsis
            asset-suffix: Windows-x64-Setup
            bundle-kind: windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build macOS app bundle
        if: matrix.bundle-kind == 'macos'
        run: npm run tauri -- build ${{ matrix.args }} --ci

      - name: Package and upload macOS DMG
        if: matrix.bundle-kind == 'macos'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          chmod +x scripts/package-macos-dmg.sh
          dmg_path="$(scripts/package-macos-dmg.sh "${{ matrix.rust-target }}" "${{ matrix.asset-suffix }}" | tail -n 1)"
          gh release upload "${RELEASE_TAG}" "${dmg_path}" --repo "${GITHUB_REPOSITORY}" --clobber

      - name: Build Windows NSIS bundle
        if: matrix.bundle-kind == 'windows'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: 船长密码箱 ${{ env.RELEASE_TAG }}
          releaseBody: |
            CaptainPassword desktop builds for Windows x64, macOS Apple Silicon, and macOS Intel.

            macOS builds are ad-hoc signed to keep the app bundle structurally valid, but they are not notarized yet. macOS may still show a security warning until Developer ID signing and notarization are configured.
          releaseDraft: false
          prerelease: false
          assetNamePattern: CaptainPassword-v[version]-${{ matrix.asset-suffix }}[ext]
          args: ${{ matrix.args }}
